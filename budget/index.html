<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Budget</title>
<style>
  body { margin: 0; background: #0a0e14; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; }
  .loader { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader"></div>
<script>
  // Auto-redirect — the PWA stays pointed at this stable URL forever
  const targets = [
    'https://vip-flower-jerusalem-transform.trycloudflare.com/dashboard.html',
    'https://vip-flower-jerusalem-transform.trycloudflare.com/'
  ];

  // Redirect with a short delay so PWA sees the redirect page flash
  setTimeout(() => {
    window.location.replace(targets[0]);
  }, 300);
</script>
</body>
</html>
